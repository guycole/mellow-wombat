---
- name: pull-hyena
  become: true
  hosts: "{{ target_hosts }}"
  tasks:
    - name: ensure github directory exists
      ansible.builtin.file:
        path: "/home/wombat/github"
        state: directory
        owner: wombat
        group: wombat
        mode: "0755"

    - name: clone or pull mellow-hyena-v2
      become: false
      ansible.builtin.git:
        repo: https://github.com/guycole/mellow-hyena-v2
        dest: "/home/wombat/github/mellow-hyena-v2"
        update: yes
