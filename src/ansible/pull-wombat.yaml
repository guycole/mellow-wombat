---
- name: pull-wombat
  become: true
  hosts: "{{ target_hosts }}"
  tasks:
    - name: ensure github directory exists
      ansible.builtin.file:
        path: "/home/wombat/github"
        state: directory
        owner: wombat
        group: wombat
        mode: "0755"

    - name: clone or pull mellow-wombat
      become: false
      ansible.builtin.git:
        repo: https://github.com/guycole/mellow-wombat
        dest: "/home/wombat/github/mellow-wombat"
        update: yes
        version: main
